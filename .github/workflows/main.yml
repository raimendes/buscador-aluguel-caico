name: Busca Diaria Caico
on:
  schedule:
    # Roda todos os dias às 11:00 UTC (08:00 da manhã em Caicó/Brasília)
    - cron: '0 11 * * *'
  workflow_dispatch: # Isso aqui cria um botão para você rodar na hora que quiser

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar codigo do GitHub
        uses: actions/checkout@v3

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar Chrome e Bibliotecas
        run: |
          pip install selenium webdriver-manager beautifulsoup4 requests

      - name: Rodar o buscador
        env:
          # Aqui ele puxa as chaves que você vai cadastrar no "Settings" do site
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python buscador.py
